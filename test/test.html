<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="box box-default boxes">
        <div class="box padding-0">
          <h1>Header 1</h1>
          <h2>Header 2</h2>
          <h3>Header 3</h3>
          <h4>Header 4</h4>
          <h5>Header 5</h5>
          <h6>Header 6</h6>
          <p>Paragraph</p>
        </div>
        <div class="box padding-0">
          <h3>Buttons</h3>
          <div class="buttons">
            <a class="btn btn-primary" href="#">Primary Button</a>
            <a class="btn btn-second" href="#">Second Button</a>
          </div>
        </div>
      </div>
      <div class="boxes">
        <div class="box error-box">
          <h3>Error!</h3>
          <p>error box</p>
        </div>
        <div class="box success-box">
          <h3>Success!</h3>
          <p>success box</p>
        </div>
        <div class="box warn-box">
          <h3>Warn!</h3>
          <p>warn box</p>
        </div>
        <div class="box info-box">
          <h3><i class="fa fa-info"></i> Info</h3>
          <p>info box</p>
        </div>
      </div>
    </main>
  </body>
</html>
